name: Deploy

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Docker Image bauen (amd64)
        run: docker build --platform linux/amd64 -t kabelbau:amd64 .

      - name: SSH Key einrichten
        run: |
          mkdir -p ~/.ssh
          printf '%s' "${{ secrets.DEPLOY_SSH_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          cat >> ~/.ssh/known_hosts << 'EOF'
          kabel.bennikaup.de ssh-ed25519 AAAAC3NzaC1lZDI1NTE5AAAAIMKcrHTCijyH1r/9+LD/2fGNIYUpXQEFPfj6Mjac7xEi
          kabel.bennikaup.de ecdsa-sha2-nistp256 AAAAE2VjZHNhLXNoYTItbmlzdHAyNTYAAAAIbmlzdHAyNTYAAABBBL3WS20XQTrnmyTTJhbKZy3aQr9cnior/eIbQ8diC3g220tv1am4fLbAYEuzpV60iWsr30y1ZT0kOQOYoTYnoLA=
          EOF

      - name: Image übertragen und deployen
        run: |
          docker save kabelbau:amd64 | ssh -i ~/.ssh/deploy_key \
            -o StrictHostKeyChecking=yes \
            root@kabel.bennikaup.de
