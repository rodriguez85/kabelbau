name: Deploy

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Docker Image bauen (amd64)
        run: docker build --platform linux/amd64 -t kabelbau:amd64 .

      - name: SSH Key einrichten
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.DEPLOY_SSH_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan kabel.bennikaup.de >> ~/.ssh/known_hosts

      - name: Image übertragen und deployen
        run: |
          docker save kabelbau:amd64 | ssh -i ~/.ssh/deploy_key \
            -o StrictHostKeyChecking=yes \
            root@kabel.bennikaup.de
