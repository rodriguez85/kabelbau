name: Deploy

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: deployment

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Docker Image bauen (amd64)
        run: docker build --platform linux/amd64 -t kabelbau:amd64 .

      - name: SSH Agent einrichten
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.DEPLOY_SSH_KEY }}

      - name: Known Host hinterlegen
        run: |
          mkdir -p ~/.ssh
          echo "kabel.bennikaup.de ssh-ed25519 AAAAC3NzaC1lZDI1NTE5AAAAIMKcrHTCijyH1r/9+LD/2fGNIYUpXQEFPfj6Mjac7xEi" >> ~/.ssh/known_hosts

      - name: Image übertragen und deployen
        run: |
          docker save kabelbau:amd64 | ssh -o StrictHostKeyChecking=yes \
            root@kabel.bennikaup.de
